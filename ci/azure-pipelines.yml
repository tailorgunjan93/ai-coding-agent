trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "20"

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: |
              npm install
              npm run build
            displayName: "Build project"

  - stage: Lint
    jobs:
      - job: Lint
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: |
              npm install
              npm run lint
            displayName: "Run lint checks"

  - stage: Test
    jobs:
      - job: Test
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: |
              npm install
              npm run test:unit
              npm run test:integration
              npm run test:edge
            displayName: "Run tests"

  - stage: Security
    jobs:
      - job: Security
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: |
              npm install -g snyk
              snyk test
            displayName: "Run security scan"

  - stage: Deploy
    dependsOn: [ Build, Lint, Test, Security ]
    condition: succeeded()
    jobs:
      - job: Deploy
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: |
              npm install -g vsce
              vsce publish
            displayName: "Publish to VS Code Marketplace"
